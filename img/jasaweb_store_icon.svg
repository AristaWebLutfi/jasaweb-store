        fill="none" stroke="#82C8E5" stroke-width="20"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tag dot : simbol store/produk -->
  <circle cx="132" cy="60" r="20" fill="#F9F7F7" stroke="#82C8E5" stroke-width="7"/>
  <circle cx="132" cy="60" r="6" fill="#002080"/>
</svg>
