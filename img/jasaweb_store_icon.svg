<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="badgeGradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#002080"/>
      <stop offset="100%" stop-color="#0047AB"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="0" y="0" width="200" height="200" rx="46" fill="url(#badgeGradIcon)"/>

  <!-- Bracket '>' : simbol web/kode -->
